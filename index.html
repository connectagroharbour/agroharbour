<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
  <meta name="theme-color" content="#2E7D32" />
  <meta name="msapplication-TileColor" content="#2E7D32" />
  
  <link rel="icon" type="image/png" href="https://www.agroharbour.com/Agro-logo.png" />
  <link rel="apple-touch-icon" href="https://www.agroharbour.com/Agro-logo.png" />
  <link rel="manifest" href="https://www.agroharbour.com/manifest.json" />
  <link rel="canonical" href="https://www.agroharbour.com/" />
  
  <!-- Primary Meta Tags -->
  <title>AgroHarbour - Leading Agricultural Solutions</title>
  <meta name="title" content="AgroHarbour - Leading Agricultural Solutions" />
  <meta name="description" content="AgroHarbour provides expert agronomist services, soil testing, and modern hydroponic consulting to help farmers maximize yields and achieve sustainable growth." />
  <meta name="keywords" content="agriculture, agronomist, soil testing, hydroponics, farm consulting, sustainable farming, india, punit gupta" />

  <!-- JSON-LD for Google Logo & Organization -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "AgroHarbour",
      "url": "https://www.agroharbour.com/",
      "logo": "https://www.agroharbour.com/Agro-logo.png",
      "description": "AgroHarbour provides expert agronomist services, soil testing, and modern hydroponic consulting.",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+91-9214520086",
        "contactType": "customer service"
      },
      "sameAs": [
        "https://www.instagram.com/agroharbour/"
      ]
    }
  </script>

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.agroharbour.com/" />
  <meta property="og:site_name" content="AgroHarbour" />
  <meta property="og:title" content="AgroHarbour - Leading Agricultural Solutions" />
  <meta property="og:description" content="Expert agronomist services and modern farming solutions for sustainable growth." />
  <meta property="og:image" content="https://www.agroharbour.com/Agro-logo.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://www.agroharbour.com/" />
  <meta property="twitter:title" content="AgroHarbour - Leading Agricultural Solutions" />
  <meta property="twitter:description" content="Expert agronomist services and modern farming solutions." />
  <meta property="twitter:image" content="https://www.agroharbour.com/Agro-logo.png" />
  <meta property="twitter:image:alt" content="AgroHarbour Logo" />

  <style>
    html,
    body {
      height: 100%;
      margin: 0;
    }

    #root {
      height: 100%;
    }

    .logo-filter {
      filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.5)) drop-shadow(0 0 2px rgba(0, 0, 0, 0.2));
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
